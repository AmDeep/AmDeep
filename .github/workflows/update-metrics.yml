name: Auto Update Profile Metrics

on:
  schedule:
    - cron: '0 3 * * *'   # Daily at 3 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Comprehensive Metrics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'AmDeep';
            
            // Fetch all repositories
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: username,
              per_page: 100
            });
            
            let totalStars = 0;
            let totalForks = 0;
            let totalSize = 0;
            let langCount = {};
            let orgs = new Set();
            let recentPushes = 0;
            
            repos.forEach(repo => {
              if (!repo.fork) {
                totalStars += repo.stargazers_count || 0;
                totalForks += repo.forks_count || 0;
                totalSize += repo.size || 0;
              }
              if (repo.language) {
                langCount[repo.language] = (langCount[repo.language] || 0) + 1;
              }
              if (repo.owner.type === 'Organization') {
                orgs.add(repo.owner.login);
              }
              if (repo.pushed_at) recentPushes++;
            });
            
            const topLangs = Object.entries(langCount)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5)
              .map(([l, c]) => `${l} (${c})`)
              .join(', ');
            
            let readme = fs.readFileSync('README.md', 'utf8');
            
            const metricsBlock = `<!-- AUTO-METRICS-START -->
### 📊 Auto-Generated Profile Metrics (Updated: ${new Date().toISOString().split('T')[0]})

**Repository Stats**
- Public Repositories: ${repos.length}
- Total Stars: ${totalStars}
- Total Forks: ${totalForks}
- Total Code Size: ${(totalSize / 1024).toFixed(1)} MB

**Activity & Contributions**
- Organizations: ${Array.from(orgs).join(', ') || 'Omdena + personal'}
- Recent Pushes: ${recentPushes} repositories
- PRs & Collaboration: Active in team capstones and personal projects

**Top Languages**: ${topLangs}

![Profile Views](https://komarev.com/ghpvc/?username=AmDeep)
<!-- AUTO-METRICS-END -->`;
            
            // Replace or append
            if (readme.includes('<!-- AUTO-METRICS-START -->')) {
              readme = readme.replace(/<!-- AUTO-METRICS-START -->[\s\S]*?<!-- AUTO-METRICS-END -->/, metricsBlock);
            } else {
              readme += '\n\n' + metricsBlock;
            }
            
            fs.writeFileSync('README.md', readme);
            console.log('✅ Metrics updated successfully!');
