name: Auto Update Profile Metrics

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update Metrics
        run: |
          DATE=$(date +%Y-%m-%d)
          
          cat > /tmp/metrics.md << 'EOL'
          ### 📊 Auto-Generated Profile Metrics (Updated: DATE_PLACEHOLDER)

          **Repository Stats**
          - Public Repositories: 20+
          - Organizations: Omdena
          - Top Languages: Python, JavaScript/TypeScript, Jupyter Notebook
          - Recent Activity: Active pushes to ML, biotech, and web projects
          - Collaboration: PRs opened/merged in capstone and team projects

          ![Profile Views](https://komarev.com/ghpvc/?username=AmDeep)
          EOL
          
          sed -i "s|DATE_PLACEHOLDER|$DATE|g" /tmp/metrics.md
          
          # Replace the section in README.md
          sed -i '/<!-- AUTO-METRICS-START -->/,/<!-- AUTO-METRICS-END -->/{
            /<!-- AUTO-METRICS-START -->/!{
              /<!-- AUTO-METRICS-END -->/!d
            }
          }' README.md
          
          sed -i '/<!-- AUTO-METRICS-START -->/r /tmp/metrics.md' README.md
          
          echo "Metrics updated on $DATE"
        shell: bash

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile metrics"
          file_pattern: README.md
