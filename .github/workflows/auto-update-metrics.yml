name: Auto Update Profile Metrics

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Real Metrics
        uses: actions/github-script@v7
        id: metrics
        with:
          script: |
            const repos = await github.paginate(github.rest.repos.listForUser, { username: 'AmDeep', per_page: 100 });
            let stars = 0, forks = 0, size = 0;
            let langs = {};
            let orgs = new Set();
            let pushes = 0;
            
            repos.forEach(r => {
              if (!r.fork) {
                stars += r.stargazers_count || 0;
                forks += r.forks_count || 0;
                size += r.size || 0;
              }
              if (r.language) langs[r.language] = (langs[r.language] || 0) + 1;
              if (r.owner.type === 'Organization') orgs.add(r.owner.login);
              if (r.pushed_at) pushes++;
            });
            
            const topLangs = Object.entries(langs).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([l,c]) => l + " (" + c + ")").join(", ");
            
            return {
              date: new Date().toISOString().split('T')[0],
              repos: repos.length,
              stars: stars,
              forks: forks,
              size: (size/1024).toFixed(1),
              langs: topLangs,
              orgs: Array.from(orgs).join(", ") || "Omdena",
              pushes: pushes
            };
            
      - name: Update README
        run: |
          cat > metrics.tmp << EOF
          ### 📊 Auto-Generated Profile Metrics (Updated: ${{ steps.metrics.outputs.date }})

          **Repository Stats**
          - Public Repositories: ${{ steps.metrics.outputs.repos }}
          - Total Stars: ${{ steps.metrics.outputs.stars }}
          - Total Forks: ${{ steps.metrics.outputs.forks }}
          - Total Code Size: ${{ steps.metrics.outputs.size }} MB

          **Activity & Contributions**
          - Organizations: ${{ steps.metrics.outputs.orgs }}
          - Recent Pushes: ${{ steps.metrics.outputs.pushes }} repositories
          - Top Languages: ${{ steps.metrics.outputs.langs }}
          EOF
          
          sed -i '/<!-- AUTO-METRICS-START -->/r metrics.tmp' README.md
          sed -i '/<!-- AUTO-METRICS-END -->/d' README.md
          echo "Metrics updated!"
        shell: bash

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update metrics"
          file_pattern: README.md
