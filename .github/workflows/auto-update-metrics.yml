name: Auto Update Profile Metrics

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate and Update Metrics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const repos = await github.paginate(github.rest.repos.listForUser, { username: 'AmDeep', per_page: 100 });
            
            let stars = 0, forks = 0, size = 0;
            let langs = {};
            let orgs = new Set();
            let pushes = 0;
            
            repos.forEach(r => {
              if (!r.fork) {
                stars += r.stargazers_count || 0;
                forks += r.forks_count || 0;
                size += r.size || 0;
              }
              if (r.language) langs[r.language] = (langs[r.language] || 0) + 1;
              if (r.owner.type === 'Organization') orgs.add(r.owner.login);
              if (r.pushed_at) pushes++;
            });
            
            const topLangs = Object.entries(langs).sort((a,b) => b[1]-a[1]).slice(0,4).map(([l,c]) => l + " (" + c + ")").join(", ");
            const date = new Date().toISOString().split('T')[0];
            
            let readme = fs.readFileSync('README.md', 'utf8');
            
            const block = `<!-- AUTO-METRICS-START -->
### 📊 Auto-Generated Profile Metrics (Updated: ${date})

**Repository Stats**
- Public Repositories: ${repos.length}
- Total Stars: ${stars}
- Total Forks: ${forks}
- Total Code Size: ${(size/1024).toFixed(1)} MB

**Activity & Contributions**
- Organizations: ${Array.from(orgs).join(', ') || 'Omdena'}
- Recent Pushes: ${pushes} repositories
- Top Languages: ${topLangs}
<!-- AUTO-METRICS-END -->`;
            
            readme = readme.replace(/<!-- AUTO-METRICS-START -->[\s\S]*?<!-- AUTO-METRICS-END -->/, block) || readme + block;
            fs.writeFileSync('README.md', readme);
            console.log('Metrics updated!');
