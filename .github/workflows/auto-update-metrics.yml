name: Auto Update Profile Metrics

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Real Metrics from GitHub
        uses: actions/github-script@v7
        id: metrics
        with:
          script: |
            const repos = await github.paginate(github.rest.repos.listForUser, { username: 'AmDeep', per_page: 100 });
            
            let stars = 0, forks = 0, size = 0;
            let langs = {};
            let orgs = new Set();
            let pushes = 0;
            
            repos.forEach(r => {
              if (!r.fork) {
                stars += r.stargazers_count || 0;
                forks += r.forks_count || 0;
                size += r.size || 0;
              }
              if (r.language) langs[r.language] = (langs[r.language] || 0) + 1;
              if (r.owner.type === 'Organization') orgs.add(r.owner.login);
              if (r.pushed_at) pushes++;
            });
            
            const topLangs = Object.entries(langs).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([l,c]) => l + " (" + c + ")").join(", ");
            
            return {
              repos: repos.length,
              stars: stars,
              forks: forks,
              size: (size/1024).toFixed(1),
              langs: topLangs,
              orgs: Array.from(orgs).join(", ") || "Omdena",
              pushes: pushes,
              date: new Date().toISOString().split('T')[0]
            };
            
      - name: Update README with Real Data
        run: |
          DATE="${{ steps.metrics.outputs.date }}"
          REPOS="${{ steps.metrics.outputs.repos }}"
          STARS="${{ steps.metrics.outputs.stars }}"
          FORKS="${{ steps.metrics.outputs.forks }}"
          SIZE="${{ steps.metrics.outputs.size }}"
          LANGS="${{ steps.metrics.outputs.langs }}"
          ORGS="${{ steps.metrics.outputs.orgs }}"
          PUSHES="${{ steps.metrics.outputs.pushes }}"
          
          cat > metrics.tmp << EOF
          ### 📊 Auto-Generated Profile Metrics (Updated: $DATE)

          **Repository Stats**
          - Public Repositories: $REPOS
          - Total Stars: $STARS
          - Total Forks: $FORKS
          - Total Code Size: $SIZE MB

          **Activity**
          - Organizations: $ORGS
          - Recent Pushes: $PUSHES repositories
          - Top Languages: $LANGS
          EOF
          
          sed -i '/AUTO-METRICS-START/,/AUTO-METRICS-END/c\<!-- AUTO-METRICS-START -->\n$(cat metrics.tmp)\n<!-- AUTO-METRICS-END -->' README.md
        shell: bash

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update metrics"
          file_pattern: README.md
